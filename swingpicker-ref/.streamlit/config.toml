[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false
# fileWatcherType은 배포 환경(Streamlit Cloud)에서는 'none'이 성능상 더 유리합니다.
fileWatcherType = "none"
# [v20.0.1] 모바일 탭 전환 시 튕김 방지
enableWebsocketCompression = false
maxMessageSize = 200

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#4CAF50"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
font = "sans serif"

[client]
# 'viewer'로 설정하면 상단 햄버거 메뉴(⋮)를 최소화하여 더 '앱'처럼 보입니다.
# 개발 중에는 'minimal', 배포 시에는 'viewer' 추천
toolbarMode = "viewer"
showErrorDetails = false

[runner]
magicEnabled = false  # 성능 최적화를 위해 불필요한 매직 커맨드 감지 비활성화
# fastReruns = true  <-- (삭제됨) 최신 버전에서는 더 이상 사용되지 않음
