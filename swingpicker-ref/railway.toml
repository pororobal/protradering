# ─────────────────────────────────────────────
# Railway 배포 설정
# ─────────────────────────────────────────────
[build]
# Dockerfile 사용 (Nixpacks 대신)
dockerfilePath = "Dockerfile"

[deploy]
# 헬스체크 (NiceGUI는 / 에서 200 응답)
healthcheckPath = "/"
healthcheckTimeout = 120
# 재시작 정책
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
