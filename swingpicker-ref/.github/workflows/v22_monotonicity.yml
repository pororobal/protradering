# .github/workflows/v22_monotonicity.yml
# ═══════════════════════════════════════════════
# SwingPicker v22 Monotonicity / CI HARD Gate
# ─ 참조: SwingPicker_v22_Final_Consolidated.md §3
#
# [v22.2] 변경:
#   · monotonicity_report 부재 정책을 이벤트별로 분리:
#     - pull_request → SKIP (PR 작업자가 collector를 못 돌릴 수 있음)
#     - schedule / push to main → FAIL
#   · continue-on-error 제거 (이전 단계에서 이미 함, 유지)
# ═══════════════════════════════════════════════
name: v22 Monotonicity

on:
  push:
    branches: [main, "feature/v22-*"]
    paths:
      - "data/recommend_latest.csv"
      - "data/winrate_table_*.json"
      - "data/top_pick_*.json"
      - "shared_utils.py"
      - "scoring_engine.py"
      - "pipeline_calibrate.py"
      - "pipeline_finalize.py"
      - "kelly_calibrator.py"
      - "auto_backtest.py"
      - "daily_briefing.py"
      - ".github/workflows/v22_monotonicity.yml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 7 * * 1-5"   # KST 16:30 (장 마감 + collector 30분 후)
  workflow_dispatch:

concurrency:
  group: v22-mono-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monotonicity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy pytest

      - name: 🧪 Route 계약 테스트
        run: python -m pytest test_route_contract_v22.py -v --tb=short

      - name: 📊 monotonicity_report 생성
        id: monobuild
        env:
          PYTHONUTF8: "1"
        run: |
          YMD=$(date -u +"%Y%m%d")
          echo "asof_ymd=$YMD" >> $GITHUB_OUTPUT
          mkdir -p data

          # daily_briefing 자체 실행 실패는 다음 step에서 분기 처리
          # (pull_request라면 통과, push/schedule이라면 fail)
          # 단, 실패 정보를 보존하기 위해 ::warning::으로 출력
          python daily_briefing.py data $YMD || \
            echo "::warning::daily_briefing 실행 실패 (collector 미실행 가능성)"

      - name: 🛡️ CI HARD Gate 검증
        env:
          PYTHONUTF8: "1"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python <<'PYEOF'
          import json, sys, os

          path = "data/monotonicity_report_latest.json"
          event = os.environ.get("GITHUB_EVENT_NAME", "")

          if not os.path.exists(path):
              # [v22.2] 이벤트별 정책 분리
              if event in ("pull_request", "workflow_dispatch"):
                  print(f"⏭️  monotonicity_report 없음 — SKIP (event={event})")
                  print("   PR 작업자는 보통 collector를 못 돌리므로 통과시킴.")
                  sys.exit(0)
              else:
                  # push to main / schedule 에서는 무조건 있어야 함
                  print(f"❌ monotonicity_report 없음 (event={event})")
                  print("   main push 또는 schedule 실행에서는 collector가 돌고")
                  print("   data/monotonicity_report_latest.json이 생성되어야 합니다.")
                  print("   daily_briefing.py가 실패했거나 collector가 안 돈 상태입니다.")
                  sys.exit(1)

          with open(path, "r", encoding="utf-8") as f:
              r = json.load(f)

          print("=" * 60)
          print(f"📊 monotonicity_report ({r.get('asof_ymd')})")
          print(f"   event={event}")
          print("=" * 60)

          print(f"  TOP_PICK count: {r.get('top_pick_count', 0)}")
          print(f"  declared_wr_top_pick: {r.get('declared_wr_top_pick')}")
          print(f"  declared_wr_active:   {r.get('declared_wr_active')}")
          print(f"  realized_wr:          {r.get('realized_wr')}")
          print(f"  gap (top_pick):       {r.get('declared_vs_realized_gap_top_pick')}")
          print(f"  gap (active):         {r.get('declared_vs_realized_gap_active')}")
          print(f"  avg_ret_excess_pct:   {r.get('avg_ret_excess_pct')}")
          print(f"  market_map_coverage:  {r.get('market_map_coverage')}")
          print(f"  stable_7day_avg:      {r.get('top_pick_stable_7day_avg')}")
          print()

          print("🛡️ HARD Gates:")
          for g in r.get("ci_hard", []):
              icon = {"PASS": "✅", "FAIL": "❌", "SKIP": "⏭️"}.get(g["status"], "❓")
              print(f"  {icon} {g['gate']}: {g['status']} ({g.get('detail', '')})")

          print("\n💡 SOFT Gates:")
          for g in r.get("ci_soft", []):
              icon = {"OK": "✅", "WARN": "⚠️"}.get(g["status"], "❓")
              print(f"  {icon} {g['gate']}: {g['status']} ({g.get('detail', '')})")

          hard_pass = r.get("ci_hard_all_pass", False)
          soft_warn = r.get("ci_soft_any_warn", False)

          print("\n" + "=" * 60)
          print(f"최종: HARD={'PASS ✅' if hard_pass else 'FAIL ❌'}, "
                f"SOFT={'WARN ⚠️' if soft_warn else 'OK ✅'}")
          print("=" * 60)

          if not hard_pass:
              sys.exit(1)
          PYEOF

      - name: 📤 monotonicity_report 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monotonicity-report-${{ steps.monobuild.outputs.asof_ymd }}
          path: |
            data/monotonicity_report_*.json
            data/top_pick_validation_*.json
            data/top_pick_funnel_*.json
          if-no-files-found: warn
          retention-days: 30
