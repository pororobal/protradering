# .github/workflows/collect_kospi_daily.yml
# ═══════════════════════════════════════════════════════════════
# KOSPI daily 수익률 수집 — real 알파 경로 활성화
#
# 실행:
#   1. 평일 16:30 KST (UTC 07:30) — KRX 마감(15:30) + 1시간 안정 버퍼
#   2. workflow_dispatch (수동 트리거)
#
# 산출물:
#   data/kospi_daily.csv — date, close, ret_1d_%, ret_3d_%, ret_5d_%,
#                          ret_10d_%, ret_20d_%, ret_60d_%
#
# 정합:
#   · auto_collect.yml (20:05 KST)과 시간 분리 — 동일 시점 충돌 방지
#   · services/benchmarks._BENCH_HOLD_MAP과 컬럼 정합
#
# 실패 정책:
#   · pykrx 실패 시 FDR → yfinance 폴백 (collect_kospi_daily.py 내부)
#   · 3단계 모두 실패 시 워크플로우 fail (Telegram 알림은 후속 추가 검토)
# ═══════════════════════════════════════════════════════════════
name: Collect KOSPI Daily

on:
  schedule:
    # 평일 16:30 KST (UTC 07:30)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      start:
        description: "시작일 YYYYMMDD (빈칸=5년 전)"
        required: false
        default: ""
      end:
        description: "종료일 YYYYMMDD (빈칸=오늘)"
        required: false
        default: ""

permissions:
  contents: write  # data/kospi_daily.csv 커밋/푸시

concurrency:
  group: collect-kospi-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas pykrx
          # 폴백 라이브러리
          pip install finance-datareader yfinance || true

      - name: KOSPI daily 수집
        run: |
          ARGS=""
          if [ -n "${{ inputs.start }}" ]; then ARGS="$ARGS --start ${{ inputs.start }}"; fi
          if [ -n "${{ inputs.end }}" ]; then ARGS="$ARGS --end ${{ inputs.end }}"; fi
          python scripts/collect_kospi_daily.py $ARGS

      - name: 산출물 검증
        run: |
          if [ ! -f data/kospi_daily.csv ]; then
            echo "::error::data/kospi_daily.csv 생성 실패"
            exit 1
          fi
          # 필수 컬럼 존재 확인
          python -c "
          import pandas as pd
          df = pd.read_csv('data/kospi_daily.csv')
          required = ['date', 'close', 'ret_1d_%', 'ret_3d_%', 'ret_5d_%',
                      'ret_10d_%', 'ret_20d_%', 'ret_60d_%']
          missing = [c for c in required if c not in df.columns]
          if missing:
              print(f'::error::필수 컬럼 누락: {missing}')
              raise SystemExit(1)
          # 최근 60일은 ret_60d_% NaN 자연스러움 (shift(-60))
          # 60일 이전 데이터는 ret_60d_% 있어야 함
          old_data = df.iloc[:-60] if len(df) > 60 else df
          if old_data['ret_60d_%'].isna().all():
              print('::error::ret_60d_% 전부 NaN — pct_change 로직 확인 필요')
              raise SystemExit(1)
          print(f'✅ 검증 OK: {len(df)}일, 컬럼 {len(df.columns)}개')
          "

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/kospi_daily.csv
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "data: KOSPI daily 갱신 ($(date +%Y-%m-%d))"
            git push
          fi
